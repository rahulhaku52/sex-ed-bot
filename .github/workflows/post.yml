name: Auto Sex Ed Poster

on:
  schedule:
    - cron: '0 */4 * * *'   # প্রতি ৪ ঘণ্টায় (দিনে ৬ বার)
  workflow_dispatch:          # ম্যানুয়ালি রান করার জন্য

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests feedparser
      - name: Run poster
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
